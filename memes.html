<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Monigga Memes — $MONIGGA meme gallery</title>
  <meta name="description" content="$MONIGGA meme gallery, the blackest nigga breathing on Monad. Community memes and art.">

  <meta property="og:title" content="Monigga Memes — $MONIGGA meme gallery">
  <meta property="og:description" content="$MONIGGA meme gallery, the blackest nigga breathing on Monad. Community memes and art.">
  <meta property="og:image" content="images/og-image.jpg">
  <meta property="og:url" content="https://moningga.fun/memes.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">

  <style>
    @font-face {
      font-family: 'Roboto Mono';
      font-style: normal;
      font-weight: 500 800;
      font-display: swap;
      src: url(fonts/RobotoMono.ttf) format('ttf');
    }

    :root {
      --bg-color: #ffffff;
      --text-color: #1a1a1a;
      --text-secondary: #666666;
      --text-muted: #aaaaaa;
      --accent: #7B3FE4;
      --accent-hover: #6930c3;
      --accent-glow: rgba(123, 63, 228, 0.25);
      --surface: rgba(245, 243, 255, 0.8);
      --surface-border: #e4d8f8;
      --card-bg: #ffffff;
    }

    [data-theme="dark"] {
      --bg-color: #0a0a0a;
      --text-color: #ffffff;
      --text-secondary: #888888;
      --text-muted: #505050;
      --accent: #9B5FFF;
      --accent-hover: #b080ff;
      --accent-glow: rgba(155, 95, 255, 0.3);
      --surface: rgba(255, 255, 255, 0.05);
      --surface-border: rgba(255, 255, 255, 0.1);
      --card-bg: rgba(20, 20, 20, 0.6);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: radial-gradient(ellipse at 50% 0%, var(--accent-glow) 0%, transparent 55%), var(--bg-color);
      color: var(--text-color);
      font-family: 'Roboto Mono', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── Theme Transition ── */
    html.theme-transition, html.theme-transition *, html.theme-transition *::before, html.theme-transition *::after {
      transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease !important;
    }

    /* ── Entrance Animations ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in {
      opacity: 0;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* ── Floating Top Nav ── */
    .top-nav-wrapper {
      position: fixed; top: 20px; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: center; padding: 0 20px;
      animation: fadeInUp 0.5s ease forwards;
    }
    .floating-nav {
      background: var(--surface);
      border: 1px solid var(--surface-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 8px 12px 8px 16px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--text-color); text-decoration: none; font-weight: 700; font-size: 14px;
      padding: 8px 16px; border-radius: 999px; background: rgba(255,255,255,0.05);
      transition: all 0.3s ease; border: 1px solid transparent;
    }
    .back-btn:hover { background: var(--accent-glow); color: var(--accent); border-color: var(--accent); transform: translateX(-2px); }

    .nav-right { display: flex; align-items: center; gap: 12px; }
    .meme-count { font-size: 13px; color: var(--text-secondary); font-weight: 600; background: rgba(0,0,0,0.2); padding: 4px 12px; border-radius: 20px; }
    [data-theme="light"] .meme-count { background: rgba(0,0,0,0.05); }

    .theme-toggle {
      width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--surface-border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.3s ease; position: relative; color: var(--text-color);
    }
    .theme-toggle:hover { border-color: var(--accent); background: var(--accent); color: #fff; transform: rotate(15deg); }
    .theme-toggle .icon-sun, .theme-toggle .icon-moon { position: absolute; transition: all 0.3s ease; }
    .theme-toggle .icon-sun { opacity: 0; transform: scale(0.5); }
    .theme-toggle .icon-moon { opacity: 1; transform: scale(1); }
    [data-theme="dark"] .theme-toggle .icon-sun { opacity: 1; transform: scale(1); }
    [data-theme="dark"] .theme-toggle .icon-moon { opacity: 0; transform: scale(0.5); }

    /* ── Hero Section ── */
    .hero {
      padding: 140px 20px 60px;
      text-align: center;
      position: relative;
    }
    .hero-glow {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 240px; height: 240px; background: var(--accent); filter: blur(100px);
      opacity: 0.15; z-index: -1; animation: pulseGlow 4s alternate infinite;
    }
    @keyframes pulseGlow { from { transform: translate(-50%, -50%) scale(1); opacity: 0.1; } to { transform: translate(-50%, -50%) scale(1.5); opacity: 0.25; } }

    .hero h1 {
      font-size: 4rem; font-weight: 800; letter-spacing: -1.5px; line-height: 1.1; margin-bottom: 15px;
      background: linear-gradient(135deg, var(--text-color), var(--text-muted)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero p {
      font-size: 1.2rem; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 2px;
    }

    /* ── Masonry Meme Grid ── */
    .container { max-width: 1300px; margin: 0 auto; padding: 0 20px 80px; }
    .meme-grid {
      column-count: 4; column-gap: 20px;
    }

    .meme-item {
      background: var(--card-bg); border-radius: 16px; overflow: hidden; margin-bottom: 20px;
      display: inline-block; width: 100%; border: 1px solid var(--surface-border);
      position: relative; cursor: pointer; break-inside: avoid;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease, border-color 0.3s;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      /* Staggered animation handled by JS */
      opacity: 0; transform: translateY(20px);
    }

    .meme-item.loaded {
      opacity: 1; transform: translateY(0);
      transition: opacity 0.5s ease, transform 0.5s ease, box-shadow 0.4s ease, border-color 0.3s ease;
    }

    .meme-item:hover {
      transform: scale(1.03) translateY(-5px); border-color: var(--accent); z-index: 2;
      box-shadow: 0 20px 40px var(--accent-glow);
    }

    /* Overlay on hover */
    .meme-item::after {
      content: '🔍 View'; position: absolute; inset: 0; background: rgba(0,0,0,0.5); color: white;
      display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.2rem;
      opacity: 0; transition: opacity 0.3s ease; backdrop-filter: blur(2px); pointer-events: none;
    }
    .meme-item:hover::after { opacity: 1; }

    .meme-item img, .meme-item video {
      width: 100%; height: auto; display: block; object-fit: cover;
    }

    /* Skeleton placeholder */
    .meme-item img[data-loading="true"] {
      min-height: 200px; background: linear-gradient(90deg, var(--surface) 25%, var(--accent-glow) 50%, var(--surface) 75%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── Lightbox (Enhanced Glassmorphism) ── */
    .lightbox {
      position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      z-index: 1000; display: flex; justify-content: center; align-items: center; padding: 20px;
      opacity: 0; visibility: hidden; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .lightbox.active { opacity: 1; visibility: visible; }

    .lightbox-media {
      max-width: 90%; max-height: 85vh; object-fit: contain; border-radius: 16px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6); transform: scale(0.9) translateY(20px);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); user-select: none;
    }
    .lightbox.active .lightbox-media { transform: scale(1) translateY(0); }

    .lightbox-controls {
      position: absolute; top: 20px; right: 20px; display: flex; gap: 15px; z-index: 1001;
    }

    .lb-btn {
      width: 48px; height: 48px; border-radius: 50%; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.2);
      color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer;
      transition: all 0.3s ease; backdrop-filter: blur(10px); text-decoration: none;
    }
    .lb-btn:hover { background: var(--accent); border-color: var(--accent); transform: scale(1.1); box-shadow: 0 0 20px var(--accent-glow); }

    .lightbox-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 56px; height: 56px; font-size: 24px;
    }
    .lightbox-prev { left: 30px; }
    .lightbox-next { right: 30px; }

    .lightbox-bottom {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6); padding: 10px 24px; border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px);
      color: rgba(255, 255, 255, 0.9); font-weight: 700; font-size: 14px; letter-spacing: 1px;
    }

    /* ── Back to Top ── */
    .back-to-top {
      position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; border-radius: 50%;
      background: var(--accent); color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 10px 30px var(--accent-glow); opacity: 0; visibility: hidden; transform: translateY(20px); transition: all 0.3s ease; z-index: 50;
    }
    .back-to-top.visible { opacity: 1; visibility: visible; transform: translateY(0); }
    .back-to-top:hover { background: var(--accent-hover); transform: translateY(-5px); }

    /* ── Responsive ── */
    @media (max-width: 1024px) { .meme-grid { column-count: 3; } }
    @media (max-width: 768px) {
      .hero { padding-top: 120px; }
      .hero h1 { font-size: 2.8rem; }
      .meme-grid { column-count: 2; column-gap: 15px; }
      .meme-item { margin-bottom: 15px; border-radius: 12px; }
      .lightbox-nav { display: none; /* Rely on swipe on mobile */ }
      .floating-nav { padding: 6px 10px; width: 100%; justify-content: space-between; }
    }
    @media (max-width: 480px) {
      .meme-grid { column-count: 1; }
    }
  </style>
</head>
<body>

  <div class="top-nav-wrapper">
    <nav class="floating-nav">
      <a href="index.html" class="back-btn" aria-label="Back to Home">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        Home
      </a>
      <div class="nav-right">
        <span class="meme-count" id="memeCount">Loading...</span>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark and light theme">
          <span class="icon-sun">☀️</span>
          <span class="icon-moon">🌙</span>
        </button>
      </div>
    </nav>
  </div>

  <header class="hero animate-in" style="animation-delay:0.1s">
    <div class="hero-glow"></div>
    <h1>Monigga Memes</h1>
    <p>Deep in the Monigga Trenches</p>
  </header>

  <main class="container">
    <div class="meme-grid" id="memeGrid"></div>
  </main>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <div class="lightbox-controls">
      <a class="lb-btn" id="lightboxDownload" href="" download="" aria-label="Download meme">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
      </a>
      <button class="lb-btn" id="lightboxClose" aria-label="Close viewer">✕</button>
    </div>

    <button class="lb-btn lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="Previous">❮</button>
    <img class="lightbox-media" src="" alt="Meme full size" id="lightboxImg">
    <video class="lightbox-media" id="lightboxVideo" controls playsinline loop style="display:none"></video>
    <button class="lb-btn lightbox-nav lightbox-next" id="lightboxNext" aria-label="Next">❯</button>

    <div class="lightbox-bottom" id="lightboxCounter">1 / 1</div>
  </div>

  <button class="back-to-top" id="backToTop" aria-label="Back to top">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
  </button>

  <script src="memes/meme_list.js"></script>

  <script>
    // ── Theme Logic ──
    const html = document.documentElement;
    const savedTheme = localStorage.getItem('theme') || 'dark';
    html.setAttribute('data-theme', savedTheme);

    document.getElementById('themeToggle').addEventListener('click', () => {
      html.classList.add('theme-transition');
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      setTimeout(() => html.classList.remove('theme-transition'), 350);
    });

    // ── Build Gallery Grid ──
    const memeGrid = document.getElementById('memeGrid');
    // Using the MEME_FILES array loaded from meme_list.js
    const mediaFiles = MEME_FILES.filter(f => !f.endsWith('.mp4')).reverse();
    const videoFiles = MEME_FILES.filter(f => f.endsWith('.mp4')).reverse();

    document.getElementById('memeCount').textContent = MEME_FILES.length + ' Memes';

    let delayCounter = 0;

    // Helper to create elements
    function createMemeElement(filename, type) {
      const div = document.createElement('div');
      div.className = 'meme-item';

      // Staggered entrance animation
      div.style.transitionDelay = `${(delayCounter % 15) * 0.05}s`;
      delayCounter++;
      setTimeout(() => div.classList.add('loaded'), 100);

      if(type === 'image') {
        const img = document.createElement('img');
        img.src = 'memes/' + filename;
        img.loading = 'lazy';
        img.setAttribute('data-loading', 'true');
        img.onload = () => img.removeAttribute('data-loading');
        div.appendChild(img);
      } else {
        const video = document.createElement('video');
        video.src = 'memes/' + filename;
        video.muted = true; video.loop = true; video.playsInline = true;
        div.addEventListener('mouseenter', () => video.play());
        div.addEventListener('mouseleave', () => { video.pause(); });
        div.appendChild(video);
      }
      return div;
    }

    mediaFiles.forEach(f => memeGrid.appendChild(createMemeElement(f, 'image')));
    videoFiles.forEach(f => memeGrid.appendChild(createMemeElement(f, 'video')));

    // ── Lightbox Logic ──
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightboxImg');
    const lbVid = document.getElementById('lightboxVideo');
    const lbCounter = document.getElementById('lightboxCounter');
    const lbDownload = document.getElementById('lightboxDownload');
    const allItems = Array.from(document.querySelectorAll('.meme-item'));

    let currentIndex = 0;

    function openLightbox(index) {
      currentIndex = index;
      updateLightbox();
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden'; // Prevent scrolling
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      lbVid.pause(); lbVid.src = '';
      document.body.style.overflow = '';
    }

    function updateLightbox() {
      const item = allItems[currentIndex];
      const img = item.querySelector('img');
      const vid = item.querySelector('video');

      if (img) {
        lbVid.style.display = 'none'; lbVid.pause();
        lbImg.style.display = 'block'; lbImg.src = img.src;
        lbDownload.href = img.src;
      } else if (vid) {
        lbImg.style.display = 'none';
        lbVid.style.display = 'block'; lbVid.src = vid.src; lbVid.play();
        lbDownload.href = vid.src;
      }
      lbCounter.textContent = `${currentIndex + 1} / ${allItems.length}`;
    }

    function navLightbox(direction) {
      currentIndex += direction;
      if (currentIndex < 0) currentIndex = allItems.length - 1;
      if (currentIndex >= allItems.length) currentIndex = 0;
      updateLightbox();
    }

    // Attach click events to grid items
    allItems.forEach((item, idx) => {
      item.addEventListener('click', () => openLightbox(idx));
    });

    // Controls
    document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
    document.getElementById('lightboxPrev').addEventListener('click', (e) => { e.stopPropagation(); navLightbox(-1); });
    document.getElementById('lightboxNext').addEventListener('click', (e) => { e.stopPropagation(); navLightbox(1); });
    lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });

    // Keyboard controls
    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') navLightbox(-1);
      if (e.key === 'ArrowRight') navLightbox(1);
    });

    // Mobile Swipe
    let touchStartX = 0;
    lightbox.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
    lightbox.addEventListener('touchend', e => {
      let touchEndX = e.changedTouches[0].screenX;
      if (touchEndX < touchStartX - 50) navLightbox(1);
      if (touchEndX > touchStartX + 50) navLightbox(-1);
    }, {passive: true});

    // ── Back to Top Logic ──
    const backBtn = document.getElementById('backToTop');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 400) backBtn.classList.add('visible');
      else backBtn.classList.remove('visible');
    });
    backBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

  </script>
</body>
</html>
